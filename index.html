<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Workout Home</title>

  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: system-ui, sans-serif;
      background: #0b1020;
      color: #eaf0ff;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .menu-btn {
      font-size: 1.4rem;
      background: none;
      border: none;
      color: #eaf0ff;
      cursor: pointer;
    }

    .card {
      background: rgba(255,255,255,.06);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .metric {
      background: rgba(255,255,255,.08);
      padding: 12px;
      border-radius: 12px;
      font-size: .95rem;
    }

    .primary-btn {
      width: 100%;
      padding: 14px;
      font-size: 1.1rem;
      border-radius: 14px;
      border: none;
      background: #7c5cff;
      color: #fff;
      margin-bottom: 16px;
      cursor: pointer;
    }

    /* Menu */
    .menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 240px;
      height: 100%;
      background: #11162a;
      padding: 16px;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 1000;
    }

    .menu.open {
      transform: translateX(0);
    }

    .menu h3 {
      margin-top: 0;
    }

    .menu button {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,.08);
      color: #fff;
      cursor: pointer;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      display: none;
      z-index: 999;
    }

    .overlay.show {
      display: block;
    }
  </style>
</head>

<body>

  <!-- Slide-out menu -->
  <div id="menu" class="menu">
    <h3>Start Workout</h3>
    <button onclick="goToDay('Monday')">Monday</button>
    <button onclick="goToDay('Tuesday')">Tuesday</button>
    <button onclick="goToDay('Wednesday')">Wednesday</button>
    <button onclick="goToDay('Thursday')">Thursday</button>
    <button onclick="goToDay('Friday')">Friday</button>
  </div>

  <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

  <!-- Header -->
  <div class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <b>Workout Log</b>
    <span></span>
  </div>

  <!-- Weekly Progress -->
  <div class="card">
    <b>Overall Progress</b>
    <div class="progress-grid">
      <div class="metric">Avg Weight: 210 → 208</div>
      <div class="metric">Cardio: 120 / 150</div>
      <div class="metric">Workouts: 3 / 4</div>
      <div class="metric">Weight to Goal: 30 lbs</div>
    </div>
  </div>

  <!-- Primary Action -->
  <button class="primary-btn" onclick="startToday()">Start Today’s Workout</button>

  <script>
    function startToday() {
      const day = new Date()
        .toLocaleDateString("en-US", { weekday: "long" })
      window.location.href = `${day}.html`;
    }

    function goToDay(day) {
      window.location.href = `${day}.html`;
    }

    function toggleMenu() {
      document.getElementById("menu").classList.toggle("open");
      document.getElementById("overlay").classList.toggle("show");
    }
  </script>

</body>
</html>
