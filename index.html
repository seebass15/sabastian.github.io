<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Workout Home</title>

  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: system-ui, sans-serif;
      background: #0b1020;
      color: #eaf0ff;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .menu-btn {
      font-size: 1.4rem;
      background: none;
      border: none;
      color: #eaf0ff;
      cursor: pointer;
    }

    .card {
      background: rgba(255,255,255,.06);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .metric {
      background: rgba(255,255,255,.08);
      padding: 12px;
      border-radius: 12px;
      font-size: .95rem;
    }

    .primary-btn {
      width: 100%;
      padding: 14px;
      font-size: 1.1rem;
      border-radius: 14px;
      border: none;
      background: #7c5cff;
      color: #fff;
      margin-bottom: 16px;
      cursor: pointer;
    }

    /* Menu */
    .menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 240px;
      height: 100%;
      background: #11162a;
      padding: 16px;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 1000;
    }

    .menu.open {
      transform: translateX(0);
    }

    .menu h3 {
      margin-top: 0;
    }

    .menu button {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,.08);
      color: #fff;
      cursor: pointer;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      display: none;
      z-index: 999;
    }

    .overlay.show {
      display: block;
    }

    .ring {
      position: relative;
      width: 120px;
      height: 120px;
      flex: 0 0 120px;
    }
    
    .ring-svg {
      width: 120px;
      height: 120px;
      transform: rotate(-90deg); /* start at top */
    }
    
    .ring-track {
      fill: none;
      stroke: rgba(255,255,255,0.10);
      stroke-width: 12;
    }
    
    .ring-progress {
      fill: none;
      stroke: #7c5cff;              /* brand color */
      stroke-width: 12;
      stroke-linecap: round;
      stroke-dasharray: 289;         /* set by JS too, but safe default */
      stroke-dashoffset: 289;        /* set by JS */
      transition: stroke-dashoffset 600ms ease;
      filter: drop-shadow(0 8px 18px rgba(124,92,255,0.25));
    }
    
    .ring-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      pointer-events: none;
    }
    
    .ring-pct {
      font-weight: 800;
      font-size: 1.25rem;
      line-height: 1.1;
    }
    
    .ring-week {
      margin-top: 2px;
      font-size: 0.85rem;
      opacity: 0.75;
    }
  </style>
</head>

<body>

  <!-- Slide-out menu -->
  <div id="menu" class="menu">
    <h3>Start Workout</h3>
    <button onclick="goToDay('Monday')">Monday</button>
    <button onclick="goToDay('Tuesday')">Tuesday</button>
    <button onclick="goToDay('Wednesday')">Wednesday</button>
    <button onclick="goToDay('Thursday')">Thursday</button>
    <button onclick="goToDay('Friday')">Friday</button>
  </div>

  <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

  <!-- Header -->
  <div class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <b>Workout yyyLog</b>
    <span></span>
  </div>

  <!-- Weekly Progress -->
  <div class="card">
    <b>Overall Progress</b>
    <div class="progress-grid">
      <div class="metric">Avg Weight: 210 → 208</div>
      <div class="metric">Cardio: 120 / 150</div>
      <div class="metric">Workouts: 3 / 4</div>
      <div class="metric">Weight to Goal: 30 lbs</div>
    </div>
  </div>

  <!-- Primary Action -->
  <button class="primary-btn" onclick="startToday()">Start Today’s Workout</button>

  <div class="card" id="programCard">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:16px;">
      <div>
        <b style="display:block; font-size:1.05rem;">Program Progress</b>
        <div id="programSub" style="opacity:.75; margin-top:4px; font-size:.95rem;">
          Week — of 14
        </div>
        <div id="programDates" style="opacity:.65; margin-top:6px; font-size:.85rem;">
          <!-- populated by JS -->
        </div>
      </div>
  
      <div class="ring" aria-label="14-week progress ring">
        <svg class="ring-svg" viewBox="0 0 120 120" role="img">
          <!-- Track -->
          <circle class="ring-track" cx="60" cy="60" r="46"></circle>
          <!-- Progress -->
          <circle class="ring-progress" cx="60" cy="60" r="46"></circle>
        </svg>
  
        <div class="ring-center">
          <div id="programPct" class="ring-pct">0%</div>
          <div id="programWeek" class="ring-week">Week 0</div>
        </div>
      </div>
    </div>
  </div>
``
  <script>
    function startToday() {
      const day = new Date()
        .toLocaleDateString("en-US", { weekday: "long" })
        .toUpperCase()
      window.location.href = `${day}.html`;
    }

    function goToDay(day) {
      window.location.href = `${day}.html`;
    }

    function toggleMenu() {
      document.getElementById("menu").classList.toggle("open");
      document.getElementById("overlay").classList.toggle("show");
    }
  </script>

</body>
</html>
