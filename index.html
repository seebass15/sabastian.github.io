<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Workout Home</title>

  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: system-ui, sans-serif;
      background: #0b1020;
      color: #eaf0ff;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .card {
      background: rgba(255,255,255,.06);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .metric {
      background: rgba(255,255,255,.08);
      padding: 12px;
      border-radius: 12px;
      font-size: .95rem;
    }

    .primary-btn {
      width: 100%;
      padding: 14px;
      font-size: 1.1rem;
      border-radius: 14px;
      border: none;
      background: #7c5cff;
      color: #fff;
      margin-bottom: 16px;
    }

    .day-picker button {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      background: rgba(255,255,255,.08);
      border: none;
      border-radius: 12px;
      color: #fff;
    }

    .hidden{
      display: none;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div>
    <button hidden>☰</button>
    <a href = "monday.html">Monday</a>
    </div>
    <b>Workout hhhhLog</b>
    <span></span>
  </div>

  <!-- Weekly Progress -->
  <div class="card">
    <b>Week 3 Progress</b>

    <div class="progress-grid">
      <div class="metric">Avg Weight: 210 → 208</div>
      <div class="metric">Cardio: 120 / 150</div>
      <div class="metric">Workouts: 3 / 4</div>
      <div class="metric">Weight to Goal: 30 lbs</div>
    </div>
  </div>

  <!-- Primary Action -->
  <button class="primary-btn" onclick="startToday()">Start Today’s Workout</button>

  <!-- Day Picker -->
  <div class="card day-picker">
    <b>Start Another Day</b>
    <button onclick="goToDay('monday')">Monday</button>
    <button onclick="goToDay('tuesday')">Tuesday</button>
    <button onclick="goToDay('wednesday')">Wednesday</button>
    <button onclick="goToDay('thursday')">Thursday</button>
    <button onclick="goToDay('friday')">Friday</button>
  </div>

  <script>
    function startToday() {
      const day = new Date().toLocaleDateString("en-US", { weekday: "long" }).toLowerCase();
      window.location.href = `workout.html#${day}`;
    }

    function goToDay(day) {
      window.location.href = `workout.html#${day}`;
    }

    document.addEventListener('click',async(e) =>){
      const clickedItem = e.target.classList.remove('hidden')
    }
  </script>
</body>
</html>
``
